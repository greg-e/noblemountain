name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: realtimelandscape-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: realtimelandscape-web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: npm test -- --no-coverage

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: realtimelandscape-web-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: realtimelandscape-web-ui/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Test
        run: npm test
